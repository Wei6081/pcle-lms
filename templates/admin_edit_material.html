<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Learning Material</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_form.css') }}">
</head>
<body>

<div class="page-container">

  <!-- HEADER -->
  <header>
    <div class="logo">🎓 PCLE LMS - Admin</div>
    <nav>
      <ul>
        <li><a href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="admin-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Admin Panel</h2>
      <a href="{{ url_for('admin_home') }}">Dashboard</a>
      <a href="{{ url_for('admin_manage_students') }}">Manage Students</a>
      <a href="{{ url_for('admin_feedback') }}">View Feedback</a>
      <a href="{{ url_for('admin_add_module') }}">Add Module</a>
      <a href="{{ url_for('admin_add_question') }}">Add Questions</a>
      <a href="{{ url_for('admin_add_material') }}">Add Materials</a>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="admin-panel">

        <h1>Edit Learning Material</h1>

        <form method="POST" enctype="multipart/form-data">

          <!-- MODULE -->
          <label>Module</label>
          <select name="subject_id" required>
            {% for m in modules %}
            <option value="{{ m.id }}" {% if m.id == material.subject_id %}selected{% endif %}>
              {{ m.module_name }}
            </option>
            {% endfor %}
          </select>

          <!-- LEARNING STYLE -->
          <label>Learning Style</label>
          <select name="learning_style" id="learningStyle" required>
            <option value="V" {% if material.learning_style=='V' %}selected{% endif %}>Visual</option>
            <option value="A" {% if material.learning_style=='A' %}selected{% endif %}>Auditory</option>
            <option value="R" {% if material.learning_style=='R' %}selected{% endif %}>Reading/Writing</option>
            <option value="K" {% if material.learning_style=='K' %}selected{% endif %}>Kinesthetic</option>
          </select>

          <!-- TITLE -->
          <label>Title</label>
          <input type="text" name="title" value="{{ material.title }}" required>

          <!-- MATERIAL TYPE -->
          <label>Material Type</label>
          <select name="material_type" id="materialType" required>
            <option value="text" {% if material.material_type=='text' %}selected{% endif %}>Text</option>
            <option value="video" {% if material.material_type=='video' %}selected{% endif %}>Video (YouTube)</option>
            <option value="pdf" {% if material.material_type=='pdf' %}selected{% endif %}>PDF</option>
            <option value="k_case" {% if material.material_type=='k_case' %}selected{% endif %}>Case Study MCQ</option>
          </select>

          <!-- TEXT -->
          <div id="textInput">
            <label>Content</label>
            <textarea name="content">{{ material.content if material.material_type=='text' else '' }}</textarea>
          </div>

          <!-- VIDEO -->
          <div id="videoInput" style="display:none;">
            <label>YouTube Link</label>
            <input type="url" name="video_link"
                   value="{{ material.content if material.material_type=='video' else '' }}">
          </div>

          <!-- PDF -->
          <div id="pdfInput" style="display:none;">
            <label>Upload New PDF (optional)</label>
            <input type="file" name="pdf_file" accept="application/pdf">
            <p>Current file: {{ material.content if material.material_type=='pdf' else '' }}</p>
          </div>

          <!-- K CASE -->
          <div id="kCaseInput" style="display:none;">
            <label>Scenario</label>
            <textarea name="k_scenario">{{ k_case.scenario if k_case else '' }}</textarea>

            <label>Question</label>
            <textarea name="k_question">{{ k_case.question if k_case else '' }}</textarea>

            <label>Option A</label>
            <input type="text" name="k_option_a" value="{{ k_case.option_a if k_case else '' }}">

            <label>Option B</label>
            <input type="text" name="k_option_b" value="{{ k_case.option_b if k_case else '' }}">

            <label>Option C</label>
            <input type="text" name="k_option_c" value="{{ k_case.option_c if k_case else '' }}">

            <label>Option D</label>
            <input type="text" name="k_option_d" value="{{ k_case.option_d if k_case else '' }}">

            <label>Correct Answer</label>
            <select name="k_correct_answer">
              <option value="">Select correct answer</option>
              <option value="A" {% if k_case and k_case.correct_answer == 'A' %}selected{% endif %}>A</option>
              <option value="B" {% if k_case and k_case.correct_answer == 'B' %}selected{% endif %}>B</option>
              <option value="C" {% if k_case and k_case.correct_answer == 'C' %}selected{% endif %}>C</option>
              <option value="D" {% if k_case and k_case.correct_answer == 'D' %}selected{% endif %}>D</option>
            </select>
          </div>

          <button type="submit">Update Material</button>

        </form>

      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 PCLE LMS - Admin Panel</p>
  </footer>

</div>

<script>
const learningStyle = document.getElementById("learningStyle");
const materialType = document.getElementById("materialType");
const textInput = document.getElementById("textInput");
const videoInput = document.getElementById("videoInput");
const pdfInput = document.getElementById("pdfInput");
const kCaseInput = document.getElementById("kCaseInput");

function updateMaterialOptions() {
  const style = learningStyle.value;
  const oldValue = materialType.value;

  materialType.innerHTML = "";

  if (style === "K") {
    materialType.innerHTML = `
      <option value="text">Text</option>
      <option value="k_case">Case Study MCQ</option>
    `;
  } else {
    materialType.innerHTML = `
      <option value="text">Text</option>
      <option value="video">Video (YouTube)</option>
      <option value="pdf">PDF</option>
    `;
  }

  const optionExists = [...materialType.options].some(opt => opt.value === oldValue);
  materialType.value = optionExists ? oldValue : "text";

  toggleFields();
}

function toggleFields() {
  textInput.style.display = "none";
  videoInput.style.display = "none";
  pdfInput.style.display = "none";
  kCaseInput.style.display = "none";

  if (materialType.value === "text") textInput.style.display = "block";
  if (materialType.value === "video") videoInput.style.display = "block";
  if (materialType.value === "pdf") pdfInput.style.display = "block";
  if (materialType.value === "k_case") kCaseInput.style.display = "block";
}

learningStyle.addEventListener("change", updateMaterialOptions);
materialType.addEventListener("change", toggleFields);
window.onload = updateMaterialOptions;
</script>

</body>
</html>

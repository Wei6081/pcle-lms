<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - PCLE LMS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_home.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="page-container">

  <!-- HEADER -->
  <header>
    <div class="logo">🎓 PCLE LMS - Admin</div>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
      </ul>
    </nav>
  </header>

  <!-- LOGIN CONTENT -->
  <main class="login-wrap">
    <section class="login-panel">

      <h1>Admin Login</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            {% if category == 'error' %}
              <p class="flash error">{{ message }}</p>
            {% endif %}
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('admin_login') }}" method="POST">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter admin username" required>

        <label>Password</label>

        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Enter password" required>

          <button type="button" class="toggle-password" onclick="togglePassword('password', this)" aria-label="Show password">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <button type="submit">Login</button>

      </form>

    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 PCLE LMS - Admin Panel</p>
  </footer>

</div>
<script>
    function togglePassword(id, button) {
      const input = document.getElementById(id);
      const icon = button.querySelector("i");

      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
        button.setAttribute("aria-label", "Hide password");
      } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
        button.setAttribute("aria-label", "Show password");
      }
    }
</script>
</body>
</html>

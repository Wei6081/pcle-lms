<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Module</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_form.css') }}">
</head>
<body>

<div class="page-container">

  <!-- HEADER -->
  <header>
    <div class="logo">🎓 PCLE LMS - Admin</div>
    <nav>
      <ul>
        <li><a href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="admin-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Admin Panel</h2>
      <a href="{{ url_for('admin_home') }}">Dashboard</a>
      <a href="{{ url_for('admin_add_module') }}">Add Module</a>
      <a href="{{ url_for('admin_add_question') }}">Add Questions</a>
      <a href="{{ url_for('admin_add_material') }}">Add Materials</a>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="admin-panel">

        <h1>Edit Module</h1>

        <form method="POST">

          <label>Module Name</label>
          <input type="text" name="module_name" value="{{ module.module_name }}" required>

          <label>Description</label>
          <textarea name="module_description">{{ module.module_description }}</textarea>

          <button type="submit">Update</button>

        </form>

      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 PCLE LMS - Admin Panel</p>
  </footer>

</div>

</body>
</html>
